<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Seguras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="conteudo">
        <section class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
            
            <div class="parametro-coluna__senha">
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Número de caracteres</h4>
                    <div class="parametro-senha-botoes">
                        <button class="parametro-senha__botao">-</button>
                        <p class="parametro-senha__texto">12</p>
                        <button class="parametro-senha__botao">+</button>
                    </div>
                </div>

                <div class="parametro-opcoes">
                    <label class="checkbox-container">
                        <input type="checkbox" class="checkbox" checked>
                        Letras Maiúsculas
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" class="checkbox" checked>
                        Letras Minúsculas
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" class="checkbox" checked>
                        Números
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" class="checkbox">
                        Símbolos
                    </label>
                </div>

                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Força da senha</h4>
                    <div class="barra-fundo"></div>
                    <div class="forca fraca"></div>
                    <div class="parametro-senha-textos">
                        <p>Fraca</p>
                        <p>Média</p>
                        <p>Forte</p>
                    </div>
                </div>

                <div class="resultado-container">
                    <input type="text" id="campo-senha" readonly>
                    <p class="texto-tempo">Tempo estimado para quebrar a senha: <span class="entropia"></span> dias</p>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
